name: Publish Docker image (Multi-arch)

on:
  push:
    branches:
      - main
    tags:
      - '*'
      - '!nightly*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to build (e.g., v0.10.8-alpha.3)'
        required: true
        type: string

env:
  PRIMARY_DOCKER_IMAGE: s2644752646/new-api

jobs:
  build_single_arch:
    name: Build & push (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        service: [control-api, gateway-api, ledger-worker, workflow-worker, db-migrate, ledger-backfill, v2-verify]
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}

    permissions:
      packages: write
      contents: read
      id-token: write

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && 0 || 1 }}
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag & write VERSION
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "::error::Tag '$TAG' does not exist"
              exit 1
            fi
          elif [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAG="sha-$(git rev-parse --short HEAD)"
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "${TAG}" > VERSION
          echo "Building tag: ${TAG} for ${{ matrix.arch }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PRIMARY_DOCKER_IMAGE }}

      - name: Build & push (${{ matrix.service }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          push: true
          build-args: |
            APP_PATH=./cmd/${{ matrix.service }}
          tags: |
            ${{ env.PRIMARY_DOCKER_IMAGE }}:${{ env.TAG }}-${{ matrix.service }}-${{ matrix.arch }}
            ${{ env.PRIMARY_DOCKER_IMAGE }}:latest-${{ matrix.service }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          provenance: mode=max
          sbom: true

      - name: Image summary
        run: |
          echo "### Docker Image Digest (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}-${{ matrix.service }}-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  create_manifests:
    name: Create multi-arch manifests
    needs: [build_single_arch]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        service: [control-api, gateway-api, ledger-worker, workflow-worker, db-migrate, ledger-backfill, v2-verify]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Resolve version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAG="sha-${GITHUB_SHA::7}"
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & push service manifests
        run: |
          create_manifest() {
            local target="$1"
            shift
            local attempt=1
            local delay=15

            while ! docker buildx imagetools create -t "$target" "$@"; do
              if [ "$attempt" -ge 6 ]; then
                echo "::error::Failed to create $target after $attempt attempts"
                return 1
              fi
              echo "Manifest creation failed (attempt $attempt); retrying in ${delay}s"
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          create_manifest \
            "${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}-${{ matrix.service }}" \
            "${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}-${{ matrix.service }}-amd64" \
            "${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}-${{ matrix.service }}-arm64"
          create_manifest \
            "${{ env.PRIMARY_DOCKER_IMAGE }}:latest-${{ matrix.service }}" \
            "${{ env.PRIMARY_DOCKER_IMAGE }}:latest-${{ matrix.service }}-amd64" \
            "${{ env.PRIMARY_DOCKER_IMAGE }}:latest-${{ matrix.service }}-arm64"
          if [ "${{ matrix.service }}" = "control-api" ]; then
            create_manifest "${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}" "${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}-control-api"
            create_manifest "${{ env.PRIMARY_DOCKER_IMAGE }}:latest" "${{ env.PRIMARY_DOCKER_IMAGE }}:latest-control-api"
          fi

      - name: Set up Go for cosign
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'
          cache: false

      - name: Install cosign from source
        run: |
          go install github.com/sigstore/cosign/v3/cmd/cosign@v3.0.6
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Sign multi-arch manifests with cosign
        run: |
          cosign sign --yes ${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}-${{ matrix.service }}
          cosign sign --yes ${{ env.PRIMARY_DOCKER_IMAGE }}:latest-${{ matrix.service }}
          if [ "${{ matrix.service }}" = "control-api" ]; then
            cosign sign --yes ${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}
            cosign sign --yes ${{ env.PRIMARY_DOCKER_IMAGE }}:latest
          fi

      - name: Manifest summary
        run: |
          echo "### Multi-arch Manifest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect ${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}-${{ matrix.service }} >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
