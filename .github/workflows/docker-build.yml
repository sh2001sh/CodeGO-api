name: Publish Docker image (Multi-arch)

concurrency:
  group: docker-image-publish
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    tags:
      - '*'
      - '!nightly*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to build (e.g., v0.10.8-alpha.3)'
        required: true
        type: string

env:
  PRIMARY_DOCKER_IMAGE: s2644752646/new-api

jobs:
  build_single_arch:
    name: Build & push (${{ matrix.arch }})
    strategy:
      fail-fast: false
      # Two native runners mean only six authenticated base-image pulls total,
      # well within the personal Docker Hub allowance while halving wall time.
      max-parallel: 2
      matrix:
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}

    permissions:
      packages: write
      contents: read
      id-token: write

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && 0 || 1 }}
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag & write VERSION
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "::error::Tag '$TAG' does not exist"
              exit 1
            fi
          elif [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAG="sha-$(git rev-parse --short HEAD)"
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "${TAG}" > VERSION
          echo "Building tag: ${TAG} for ${{ matrix.arch }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Every job builds only its native platform. The Docker driver reuses
          # the authenticated daemon cache populated by the base-image preflight.
          driver: docker

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Verify authenticated base image access
        run: |
          pull_with_retry() {
            local image="$1"
            local attempt=1
            local delay=15

            while ! docker pull "$image"; do
              if [ "$attempt" -ge 4 ]; then
                echo "::error::Unable to pull $image after $attempt authenticated attempts"
                return 1
              fi
              echo "Base image pull failed (attempt ${attempt}); retrying in ${delay}s"
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          pull_with_retry 'oven/bun:1@sha256:0733e50325078969732ebe3b15ce4c4be5082f18c4ac1a0f0ca4839c2e4e42a7'
          pull_with_retry 'golang:1.26.1-alpine@sha256:2389ebfa5b7f43eeafbd6be0c3700cc46690ef842ad962f6c5bd6be49ed82039'
          pull_with_retry 'debian:bookworm-slim@sha256:f06537653ac770703bc45b4b113475bd402f451e85223f0f2837acbf89ab020a'

      - name: Build and push all services with retry
        run: |
          build_service() {
            local service="$1"
            local attempt=1
            local delay=15

            while ! docker buildx build \
              --platform "linux/${{ matrix.arch }}" \
              --push \
              --provenance=false \
              --build-arg "APP_PATH=./cmd/${service}" \
              --label "org.opencontainers.image.created=$(date --utc +%Y-%m-%dT%H:%M:%SZ)" \
              --label "org.opencontainers.image.description=A unified AI model hub for aggregation & distribution." \
              --label "org.opencontainers.image.licenses=AGPL-3.0" \
              --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
              --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
              --label "org.opencontainers.image.title=CodeGO-api" \
              --label "org.opencontainers.image.url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
              --label "org.opencontainers.image.version=${TAG}" \
              --tag "${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}-${service}-${{ matrix.arch }}" \
              --tag "${{ env.PRIMARY_DOCKER_IMAGE }}:latest-${service}-${{ matrix.arch }}" \
              .; do
              if [ "$attempt" -ge 4 ]; then
                echo "::error::Build failed for ${service} after ${attempt} attempts"
                return 1
              fi
              echo "Build failed for ${service} (attempt ${attempt}); retrying in ${delay}s"
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done

            echo "### Docker Image (${{ matrix.arch }})" >> "$GITHUB_STEP_SUMMARY"
            echo "\`${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}-${service}-${{ matrix.arch }}\`" >> "$GITHUB_STEP_SUMMARY"
          }

          for service in control-api gateway-api ledger-worker workflow-worker db-migrate ledger-backfill v2-verify; do
            build_service "$service"
          done

  create_manifests:
    name: Create multi-arch manifests
    needs: [build_single_arch]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        service: [control-api, gateway-api, ledger-worker, workflow-worker, db-migrate, ledger-backfill, v2-verify]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Resolve version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAG="sha-${GITHUB_SHA::7}"
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & push service manifests
        run: |
          create_manifest() {
            local target="$1"
            shift
            local attempt=1
            local delay=15

            while ! docker buildx imagetools create -t "$target" "$@"; do
              if [ "$attempt" -ge 6 ]; then
                echo "::error::Failed to create $target after $attempt attempts"
                return 1
              fi
              echo "Manifest creation failed (attempt $attempt); retrying in ${delay}s"
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          create_manifest \
            "${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}-${{ matrix.service }}" \
            "${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}-${{ matrix.service }}-amd64" \
            "${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}-${{ matrix.service }}-arm64"
          create_manifest \
            "${{ env.PRIMARY_DOCKER_IMAGE }}:latest-${{ matrix.service }}" \
            "${{ env.PRIMARY_DOCKER_IMAGE }}:latest-${{ matrix.service }}-amd64" \
            "${{ env.PRIMARY_DOCKER_IMAGE }}:latest-${{ matrix.service }}-arm64"
          if [ "${{ matrix.service }}" = "control-api" ]; then
            create_manifest "${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}" "${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}-control-api"
            create_manifest "${{ env.PRIMARY_DOCKER_IMAGE }}:latest" "${{ env.PRIMARY_DOCKER_IMAGE }}:latest-control-api"
          fi

      - name: Set up Go for cosign
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'
          cache: false

      - name: Install cosign from source
        run: |
          go install github.com/sigstore/cosign/v3/cmd/cosign@v3.0.6
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Sign multi-arch manifests with cosign
        run: |
          cosign sign --yes ${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}-${{ matrix.service }}
          cosign sign --yes ${{ env.PRIMARY_DOCKER_IMAGE }}:latest-${{ matrix.service }}
          if [ "${{ matrix.service }}" = "control-api" ]; then
            cosign sign --yes ${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}
            cosign sign --yes ${{ env.PRIMARY_DOCKER_IMAGE }}:latest
          fi

      - name: Manifest summary
        run: |
          echo "### Multi-arch Manifest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect ${{ env.PRIMARY_DOCKER_IMAGE }}:${TAG}-${{ matrix.service }} >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
